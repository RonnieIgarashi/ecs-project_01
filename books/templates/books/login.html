<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン — Library</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 40px 48px;
            border-radius: 8px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            width: 340px;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 28px;
            text-align: center;
            letter-spacing: 0.05em;
        }
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #d8d8d8;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 18px;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }
        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background: #4a90e2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button[type="submit"]:hover {
            background: #357abd;
        }
        .error {
            background: #fff0f0;
            border: 1px solid #f5c6c6;
            color: #c0392b;
            padding: 9px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Library</h1>
        {% if form.errors %}
            <div class="error">IDまたはパスワードが正しくありません。</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="id_username">ID</label>
            <input type="text" id="id_username" name="username" autofocus autocomplete="username">
            <label for="id_password">Password</label>
            <input type="password" id="id_password" name="password" autocomplete="current-password">
            <button type="submit">ログイン</button>
        </form>
    </div>
</body>
</html>
