{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン — Library</title>
    <link rel="stylesheet" href="{% static 'books/login.css' %}">
</head>
<body>
    <div class="login-box">
        <h1>Library</h1>
        {% if form.errors %}
            <div class="error">IDまたはパスワードが正しくありません。</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="id_username">ID</label>
            <input type="text" id="id_username" name="username" autofocus autocomplete="username">
            <label for="id_password">Password</label>
            <input type="password" id="id_password" name="password" autocomplete="current-password">
            <button type="submit">ログイン</button>
        </form>
    </div>
</body>
</html>
